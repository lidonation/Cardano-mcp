<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="cmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5DB6FF" />
      <stop offset="100%" stop-color="#3FD4B0" />
    </linearGradient>
    <radialGradient id="glow1" cx="85%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#5DB6FF" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#5DB6FF" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="glow2" cx="12%" cy="90%" r="50%">
      <stop offset="0%" stop-color="#3FD4B0" stop-opacity="0.18" />
      <stop offset="100%" stop-color="#3FD4B0" stop-opacity="0" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#141822"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid pattern -->
  <pattern id="grid" x="0" y="0" width="13" height="13" patternUnits="userSpaceOnUse">
    <path d="M 13 0 L 0 0 0 13" fill="none" stroke="#5DB6FF" stroke-width="0.3" opacity="0.08"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- Border shimmer -->
  <rect x="1" y="1" width="1198" height="628" rx="0" fill="none" stroke="#5DB6FF" stroke-opacity="0.2"/>

  <!-- Top bar: mark + wordmark + badge -->
  <g transform="translate(56, 52)">
    <!-- Mark at 32px -->
    <path d="M 16 3 A 13 13 0 1 0 24.75 24.75"
      fill="none" stroke="url(#cmGrad)" stroke-width="2.75" stroke-linecap="round" />
    <circle cx="24.75" cy="24.75" r="2" fill="url(#cmGrad)" />
    <circle cx="25" cy="7.25" r="1.5" fill="#3FD4B0" />
    <path d="M 16 8.5 L 22.5 12.25 L 22.5 19.75 L 16 23.5 L 9.5 19.75 L 9.5 12.25 Z"
      fill="#101723" stroke="url(#cmGrad)" stroke-width="1.1" stroke-linejoin="round" />
    <circle cx="14.25" cy="16" r="1" fill="#5DB6FF" />
    <circle cx="17.75" cy="16" r="1" fill="#3FD4B0" />
    <!-- Wordmark -->
    <text x="42" y="22"
      font-family="Geist Mono, ui-monospace, SF Mono, Menlo, monospace"
      font-size="18" font-weight="600" fill="#F7F9FC">cardano</text>
    <text x="126" y="22"
      font-family="Geist Mono, ui-monospace, SF Mono, Menlo, monospace"
      font-size="18" fill="#3A3F52">/</text>
    <text x="138" y="22"
      font-family="Geist Mono, ui-monospace, SF Mono, Menlo, monospace"
      font-size="18" fill="#8892AA">mcp</text>
  </g>

  <!-- Live badge top-right -->
  <rect x="1060" y="44" width="140" height="28" rx="14" fill="#5DB6FF" fill-opacity="0.16" stroke="#5DB6FF" stroke-opacity="0.45"/>
  <text x="1130" y="63" text-anchor="middle"
    font-family="Geist Mono, ui-monospace, SF Mono, Menlo, monospace"
    font-size="12" fill="#5DB6FF">v0.1.0 · live</text>

  <!-- Main headline -->
  <text x="56" y="320"
    font-family="Geist, ui-sans-serif, system-ui, sans-serif"
    font-size="72" font-weight="600" letter-spacing="-1.8"
    fill="#F7F9FC">The Cardano stack,</text>
  <text x="56" y="408"
    font-family="Geist, ui-sans-serif, system-ui, sans-serif"
    font-size="72" font-weight="600" letter-spacing="-1.8"
    fill="#F7F9FC">native to your AI agent.</text>

  <!-- Subline -->
  <text x="56" y="468"
    font-family="Geist, ui-sans-serif, system-ui, sans-serif"
    font-size="22" fill="#8892AA">
    38 tools · 6 modules — UTxOs, smart contracts, indexers, and full CIP-1694 governance.
  </text>

  <!-- Footer -->
  <text x="56" y="582"
    font-family="Geist Mono, ui-monospace, SF Mono, Menlo, monospace"
    font-size="14" fill="#4A5168">github.com/Emmanuel-Tyty/Cardano-mcp</text>
  <text x="490" y="582"
    font-family="Geist Mono, ui-monospace, SF Mono, Menlo, monospace"
    font-size="14" fill="#3A3F52"> · </text>
  <text x="510" y="582"
    font-family="Geist Mono, ui-monospace, SF Mono, Menlo, monospace"
    font-size="14" fill="#3FD4B0">cardano-mcp.dev</text>
</svg>
