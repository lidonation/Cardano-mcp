<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" fill="none">
  <defs>
    <linearGradient id="cmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5DB6FF" />
      <stop offset="100%" stop-color="#3FD4B0" />
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#141822" />
      <stop offset="100%" stop-color="#171C2A" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1280" height="320" fill="url(#bgGrad)"/>

  <!-- Diagonal stripe texture -->
  <pattern id="stripes" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <rect width="18" height="18" fill="none"/>
    <line x1="0" y1="0" x2="0" y2="18" stroke="#5DB6FF" stroke-width="0.5" stroke-opacity="0.06"/>
  </pattern>
  <rect width="1280" height="320" fill="url(#stripes)"/>

  <!-- Mark at 96px, left side -->
  <g transform="translate(48, 112)">
    <path d="M 48 9 A 39 39 0 1 0 74.25 74.25"
      fill="none" stroke="url(#cmGrad)" stroke-width="8.25" stroke-linecap="round" />
    <circle cx="74.25" cy="74.25" r="6" fill="url(#cmGrad)" />
    <circle cx="75" cy="21.75" r="4.5" fill="#3FD4B0" />
    <path d="M 48 25.5 L 67.5 36.75 L 67.5 59.25 L 48 70.5 L 28.5 59.25 L 28.5 36.75 Z"
      fill="#101723" stroke="url(#cmGrad)" stroke-width="3.3" stroke-linejoin="round" />
    <circle cx="42.75" cy="48" r="3" fill="#5DB6FF" />
    <circle cx="53.25" cy="48" r="3" fill="#3FD4B0" />
  </g>

  <!-- Text block -->
  <g transform="translate(196, 0)">
    <!-- Eyebrow -->
    <text x="0" y="118"
      font-family="Geist Mono, ui-monospace, SF Mono, Menlo, monospace"
      font-size="13" letter-spacing="0.08em" text-transform="uppercase"
      fill="#3FD4B0">PRODUCTION-GRADE · TS · MIT</text>

    <!-- Title -->
    <text x="0" y="170"
      font-family="Geist Mono, ui-monospace, SF Mono, Menlo, monospace"
      font-size="52" font-weight="600" letter-spacing="-1.0"
      fill="#F7F9FC">cardano-mcp</text>

    <!-- Subtitle -->
    <text x="0" y="210"
      font-family="Geist, ui-sans-serif, system-ui, sans-serif"
      font-size="18" fill="#8892AA">
      An MCP server giving AI agents deep, idiomatic access to Cardano.
    </text>
  </g>

  <!-- Right badges -->
  <g transform="translate(1060, 104)">
    <!-- 38 tools badge -->
    <rect x="0" y="0" width="160" height="30" rx="15" fill="#5DB6FF" fill-opacity="0.16" stroke="#5DB6FF" stroke-opacity="0.45"/>
    <text x="80" y="20" text-anchor="middle"
      font-family="Geist Mono, ui-monospace, SF Mono, Menlo, monospace"
      font-size="13" fill="#5DB6FF">38 tools</text>

    <!-- 6 modules badge -->
    <rect x="0" y="42" width="160" height="30" rx="15" fill="#3FD4B0" fill-opacity="0.16" stroke="#3FD4B0" stroke-opacity="0.45"/>
    <text x="80" y="62" text-anchor="middle"
      font-family="Geist Mono, ui-monospace, SF Mono, Menlo, monospace"
      font-size="13" fill="#3FD4B0">6 modules</text>

    <!-- CIP-1694 badge -->
    <rect x="0" y="84" width="160" height="30" rx="15" fill="#1E1F2E" stroke="#3A3F52"/>
    <text x="80" y="104" text-anchor="middle"
      font-family="Geist Mono, ui-monospace, SF Mono, Menlo, monospace"
      font-size="13" fill="#8892AA">CIP-1694</text>
  </g>
</svg>
