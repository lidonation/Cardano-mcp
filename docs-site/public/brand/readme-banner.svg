<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 320" fill="none">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#141822"/>
      <stop offset="100%" stop-color="#171c2a"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="320" fill="url(#bgGrad)"/>
  <pattern id="stripes" x="0" y="0" width="18" height="18" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
    <line x1="0" y1="0" x2="0" y2="18" stroke="#3aa6e8" stroke-width="0.5" stroke-opacity="0.06"/>
  </pattern>
  <rect width="1280" height="320" fill="url(#stripes)"/>
  <!-- Mark at 1.5× scale, centered vertically -->
  <g transform="translate(48, 112) scale(1.5)">
    <circle cx="14" cy="32" r="5" fill="#3aa6e8"/>
    <path d="M 19 32 Q 32 32 42 18" fill="none" stroke="#3aa6e8" stroke-width="2" stroke-linecap="round"/>
    <path d="M 19 32 L 42 32" fill="none" stroke="#3aa6e8" stroke-width="2" stroke-linecap="round"/>
    <path d="M 19 32 Q 32 32 42 46" fill="none" stroke="#3aa6e8" stroke-width="2" stroke-linecap="round"/>
    <circle cx="46" cy="18" r="3.5" fill="none" stroke="#e2eaf4" stroke-width="2.2"/>
    <circle cx="46" cy="32" r="3.5" fill="none" stroke="#e2eaf4" stroke-width="2.2"/>
    <circle cx="46" cy="46" r="3.5" fill="none" stroke="#e2eaf4" stroke-width="2.2"/>
  </g>
  <!-- Text -->
  <g transform="translate(196, 0)">
    <text x="0" y="118"
      font-family="Geist Mono, ui-monospace, SF Mono, Menlo, monospace"
      font-size="13" letter-spacing="0.08em"
      fill="#3aa6e8">PRODUCTION-GRADE · TS · MIT</text>
    <text x="0" y="170"
      font-family="Geist Mono, ui-monospace, SF Mono, Menlo, monospace"
      font-size="52" font-weight="600" letter-spacing="-1.0"
      fill="#f6f8fb">cardano/mcp</text>
    <text x="0" y="210"
      font-family="Geist, ui-sans-serif, system-ui, sans-serif"
      font-size="18" fill="#8892aa">An MCP server giving AI agents deep, idiomatic access to Cardano.</text>
  </g>
  <!-- Badges -->
  <g transform="translate(1060, 104)">
    <rect x="0" y="0" width="160" height="30" rx="15" fill="#3aa6e8" fill-opacity="0.16" stroke="#3aa6e8" stroke-opacity="0.45"/>
    <text x="80" y="20" text-anchor="middle"
      font-family="Geist Mono, ui-monospace, SF Mono, Menlo, monospace"
